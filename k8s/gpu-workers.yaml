apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-workers
  namespace: hybrid-llm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gpu-worker
  template:
    metadata:
      labels:
        app: gpu-worker
    spec:
      containers:
      - name: gpu-worker
        image: yourrepo/gpu-worker:latest
        resources:
          limits:
            nvidia.com/gpu: 1
        env:
        - name: REDIS_URL
          value: redis.hybrid-llm.svc.cluster.local:6379